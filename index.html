
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>個人智慧助理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f2f2f7; min-height: 100vh; display: flex; justify-content: center; }
    #app { width: 100%; max-width: 390px; min-height: 100vh; display: flex; flex-direction: column; background: #f2f2f7; }
    .topbar { padding: 16px 16px 0; background: #fff; border-bottom: 0.5px solid #e0e0e0; }
    .topbar h1 { font-size: 18px; font-weight: 500; margin-bottom: 12px; }
    .content { flex: 1; overflow-y: auto; padding: 16px; }
    .navbar { display: flex; border-top: 0.5px solid #e0e0e0; background: #fff; padding: 8px 0 4px; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; background: none; border: none; cursor: pointer; padding: 4px 0; color: #8e8e93; font-size: 10px; }
    .nav-btn.active { color: #6c63ff; }
    .nav-btn span:first-child { font-size: 20px; }
    .card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 16px; padding: 1rem 1.25rem; margin-bottom: 12px; }
    .btn-primary { width: 100%; padding: 10px 0; border-radius: 10px; border: none; background: linear-gradient(90deg,#6c63ff,#48cae4); color: #fff; font-weight: 500; font-size: 15px; cursor: pointer; }
    .btn-primary:disabled { background: #aaa; cursor: default; }
    textarea, input[type=text], input[type=time] { width: 100%; font-size: 14px; border: 0.5px solid #ccc; border-radius: 8px; padding: 8px 10px; background: #f9f9f9; color: #000; font-family: inherit; }
    textarea { min-height: 100px; resize: vertical; }
    .pill { border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 500; background: #e8f0fe; color: #1a73e8; }
    .hero { background: linear-gradient(135deg,#6c63ff,#48cae4); border: none; color: #fff; border-radius: 16px; padding: 1rem 1.25rem; margin-bottom: 16px; }
    .weather-hero { background: linear-gradient(135deg,#48cae4,#0096c7); border: none; color: #fff; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
    .color-dot.selected { border-color: #333; }
    .event-bar { width: 4px; height: 40px; border-radius: 4px; flex-shrink: 0; }
    .dot { width: 5px; height: 5px; border-radius: 50%; margin: 3px auto 0; }
  </style>
</head>
<body>
<div id="app">
  <div class="topbar"><h1 id="page-title">智慧助理</h1></div>
  <div class="content" id="content"></div>
  <nav class="navbar" id="navbar"></nav>
</div>

<script>
const CLIENT_ID = "789597048583-vutpm6v0s1d9mcli7i9arkte78s3a260.apps.googleusercontent.com";
const REDIRECT_URI = "https://whitedays1051-bot.github.io/my-app";
const CLAUDE_MODEL = "claude-sonnet-4-20250514";
const TABS = [{id:"home",icon:"🏠",label:"首頁"},{id:"notes",icon:"📝",label:"記事"},{id:"weather",icon:"🌤",label:"天氣"},{id:"mail",icon:"📬",label:"Mail"},{id:"calendar",icon:"📅",label:"行事曆"}];
const TITLES = {home:"智慧助理",notes:"AI 記事",weather:"天氣",mail:"Mail 信件",calendar:"行事曆"};
const COLORS = ["#6c63ff","#48cae4","#f77f00","#43aa8b","#e63946","#9b59b6"];
const DAYS = "日一二三四五六";

let currentTab = "home";
let gmailToken = null;
let gmailUser = null;
let notes = [];
let events = [{id:1,title:"早晨運動",date:today(),time:"07:00",color:"#43aa8b"}];
let selectedDay = null;

// Check OAuth token in URL hash
if (location.hash.includes("access_token")) {
  const p = new URLSearchParams(location.hash.slice(1));
  gmailToken = p.get("access_token");
  history.replaceState(null, "", location.pathname);
  fetchGmailUser();
}

function today() { return new Date().toISOString().slice(0,10); }

async function callClaude(prompt, system="") {
  const body = { model: CLAUDE_MODEL, max_tokens: 1000, messages: [{role:"user",content:prompt}] };
  if (system) body.system = system;
  const res = await fetch("https://api.anthropic.com/v1/messages", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body) });
  const data = await res.json();
  return data.content?.[0]?.text || "";
}

async function fetchGmailUser() {
  const res = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", { headers:{Authorization:`Bearer ${gmailToken}`} });
  const d = await res.json();
  gmailUser = d.email;
  render();
}

async function fetchGmailMails() {
  const listRes = await fetch("https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=5&labelIds=INBOX", { headers:{Authorization:`Bearer ${gmailToken}`} });
  const listData = await listRes.json();
  if (!listData.messages) return [];
  return await Promise.all(listData.messages.map(async m => {
    const r = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${m.id}?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Date`, { headers:{Authorization:`Bearer ${gmailToken}`} });
    const d = await r.json();
    const hdrs = d.payload?.headers || [];
    const get = n => hdrs.find(h=>h.name===n)?.value || "";
    const dt = new Date(get("Date"));
    return { id:m.id, from:get("From").replace(/<.*>/,"").trim()||get("From"), subject:get("Subject")||"(無主旨)", time:isNaN(dt)?"":dt.toLocaleDateString("zh-TW",{month:"numeric",day:"numeric"}), snippet:d.snippet||"" };
  }));
}

function loginGmail() {
  const params = new URLSearchParams({ client_id:CLIENT_ID, redirect_uri:REDIRECT_URI, response_type:"token", scope:"https://www.googleapis.com/auth/gmail.readonly", prompt:"select_account" });
  location.href = `https://accounts.google.com/o/oauth2/v2/auth?${params}`;
}

function getWeekDates() {
  const d = new Date(); const day = d.getDay();
  const mon = new Date(d); mon.setDate(d.getDate() - day + (day===0?-6:1));
  return Array.from({length:7},(_,i)=>{ const x=new Date(mon); x.setDate(mon.getDate()+i); return x; });
}

function dateStr(d) { return d.toISOString().slice(0,10); }

// ── RENDER ──
function render() {
  document.getElementById("page-title").textContent = TITLES[currentTab];
  renderNav();
  const c = document.getElementById("content");
  if (currentTab==="home") c.innerHTML = renderHome();
  else if (currentTab==="notes") { c.innerHTML = renderNotes(); bindNotes(); }
  else if (currentTab==="weather") { c.innerHTML = `<div class='card' style='text-align:center;color:#888'>載入中...</div>`; loadWeather(); }
  else if (currentTab==="mail") { c.innerHTML = renderMail(); if(gmailToken) loadMails(); }
  else if (currentTab==="calendar") { c.innerHTML = renderCalendar(); bindCalendar(); }
}

function renderNav() {
  document.getElementById("navbar").innerHTML = TABS.map(t =>
    `<button class="nav-btn${currentTab===t.id?" active":""}" onclick="switchTab('${t.id}')"><span>${t.icon}</span><span>${t.label}</span></button>`
  ).join("");
}

function switchTab(id) { currentTab=id; render(); }

// HOME
function renderHome() {
  const h = new Date().getHours();
  const g = h<12?"早安":h<18?"午安":"晚安";
  const dt = new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"long",day:"numeric",weekday:"long"});
  return `<div class="hero"><div style="font-size:22px;font-weight:500">${g} 👋</div><div style="font-size:13px;opacity:.85;margin-top:4px">${dt}</div></div>
  ${[{id:"notes",icon:"📝",title:"AI 記事",desc:"記錄筆記，AI 幫你整理摘要"},{id:"weather",icon:"🌤",title:"天氣",desc:"台北即時天氣資訊"},{id:"mail",icon:"📬",title:"Mail",desc:"Gmail 收件匣 + AI 摘要"},{id:"calendar",icon:"📅",title:"行事曆",desc:"本週行程一覽"}].map(m=>`
  <div class="card" style="display:flex;align-items:center;gap:14px;cursor:pointer" onclick="switchTab('${m.id}')">
    <div style="font-size:28px">${m.icon}</div>
    <div><div style="font-weight:500">${m.title}</div><div style="font-size:13px;color:#888">${m.desc}</div></div>
    <div style="margin-left:auto;color:#ccc;font-size:18px">›</div>
  </div>`).join("")}`;
}

// NOTES
function renderNotes() {
  return `<div class="card">
    <div style="font-size:14px;color:#888;margin-bottom:8px">輸入筆記內容</div>
    <textarea id="note-input" placeholder="在這裡輸入你的筆記..."></textarea>
    <button class="btn-primary" style="margin-top:10px" id="note-btn" onclick="summarizeNote()">✨ AI 整理摘要</button>
  </div>
  ${notes.map(n=>`<div class="card">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span class="pill">AI 摘要</span><span style="font-size:12px;color:#aaa">${n.time}</span></div>
    <div style="font-size:13px;color:#888;margin-bottom:8px;border-left:3px solid #6c63ff;padding-left:8px">${n.raw}</div>
    <div style="font-size:14px;white-space:pre-line">${n.summary}</div>
  </div>`).join("")}`;
}

function bindNotes() {}

async function summarizeNote() {
  const inp = document.getElementById("note-input");
  const btn = document.getElementById("note-btn");
  if (!inp.value.trim()) return;
  btn.textContent="AI 整理中..."; btn.disabled=true;
  const raw = inp.value;
  const summary = await callClaude(`請幫我整理以下筆記，條列重點（繁體中文，3~5點）：\n${raw}`,"你是筆記整理助手，只輸出整理後的重點條列，不要多餘說明。");
  notes.unshift({raw, summary, time: new Date().toLocaleTimeString("zh-TW")});
  render();
}

// WEATHER
async function loadWeather() {
  const WX = {0:["晴天","☀️"],1:["大致晴","🌤"],2:["局部多雲","⛅"],3:["多雲","☁️"],45:["霧","🌫"],61:["小雨","🌧"],80:["陣雨","🌦"],95:["雷雨","⛈"]};
  try {
    const r = await fetch("https://api.open-meteo.com/v1/forecast?latitude=25.04&longitude=121.53&current=temperature_2m,relative_humidity_2m,weathercode,wind_speed_10m&hourly=temperature_2m&timezone=Asia%2FTaipei&forecast_days=1");
    const d = await r.json(); const cur = d.current;
    const [desc,icon] = WX[cur.weathercode]||["未知","🌡"];
    const temps = d.hourly.temperature_2m.slice(0,24);
    const maxT=Math.max(...temps), minT=Math.min(...temps);
    document.getElementById("content").innerHTML = `
    <div class="card weather-hero">
      <div style="font-size:13px;opacity:.85">📍 台北市</div>
      <div style="font-size:56px;margin:8px 0 4px">${icon}</div>
      <div style="font-size:42px;font-weight:500">${Math.round(cur.temperature_2m)}°C</div>
      <div style="font-size:16px;margin-top:4px">${desc}</div>
    </div>
    <div class="grid2">
      ${[["💧 濕度",`${cur.relative_humidity_2m}%`],["💨 風速",`${Math.round(cur.wind_speed_10m)} km/h`],["🌡 最高",`${Math.round(maxT)}°C`],["🌡 最低",`${Math.round(minT)}°C`]].map(([k,v])=>`
      <div class="card" style="text-align:center;margin-bottom:0"><div style="font-size:13px;color:#888">${k}</div><div style="font-size:20px;font-weight:500;margin-top:4px">${v}</div></div>`).join("")}
    </div>`;
  } catch { document.getElementById("content").innerHTML = `<div class='card'>無法取得天氣資料</div>`; }
}

// MAIL
function renderMail() {
  if (!gmailToken) return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px;text-align:center">
    <div style="font-size:48px">📬</div>
    <div style="font-weight:500;font-size:16px">連接你的 Gmail</div>
    <div style="font-size:13px;color:#888;max-width:260px">點下方按鈕，用 Google 帳號登入後即可查看信件與 AI 摘要</div>
    <button onclick="loginGmail()" style="display:flex;align-items:center;gap:10px;padding:12px 24px;border-radius:12px;border:0.5px solid #ccc;background:#fff;cursor:pointer;font-size:15px;font-weight:500">
      <img src="https://www.google.com/favicon.ico" width=18 height=18> 用 Google 帳號登入
    </button>
  </div>`;
  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div style="font-size:13px;color:#888">📬 ${gmailUser||""}</div>
    <button onclick="loadMails()" style="font-size:12px;background:none;border:0.5px solid #ccc;border-radius:8px;padding:3px 10px;cursor:pointer;color:#888">重新整理</button>
  </div>
  <div id="mail-list"><div class="card" style="text-align:center;color:#888">載入中...</div></div>`;
}

async function loadMails() {
  const list = document.getElementById("mail-list");
  if (!list) return;
  list.innerHTML = `<div class="card" style="text-align:center;color:#888">載入信件中...</div>`;
  const mails = await fetchGmailMails();
  list.innerHTML = mails.map((m,i)=>`<div class="card" style="cursor:pointer" onclick="openMail(${i})">
    <div style="display:flex;justify-content:space-between;margin-bottom:4px">
      <span style="font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%">${m.from}</span>
      <span style="font-size:12px;color:#aaa;flex-shrink:0">${m.time}</span>
    </div>
    <div style="font-weight:500;font-size:14px;margin-bottom:4px">${m.subject}</div>
    <div style="font-size:13px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.snippet}</div>
  </div>`).join("");
  window._mails = mails;
}

async function openMail(i) {
  const m = window._mails[i];
  const c = document.getElementById("content");
  c.innerHTML = `<button onclick="render()" style="background:none;border:none;cursor:pointer;color:#888;font-size:15px;padding:0;margin-bottom:12px">← 返回收件匣</button>
  <div class="card">
    <div style="font-weight:500;font-size:16px;margin-bottom:4px">${m.subject}</div>
    <div style="font-size:13px;color:#888;margin-bottom:12px">來自：${m.from}</div>
    <div style="font-size:14px;line-height:1.7">${m.snippet}</div>
  </div>
  <div class="card"><div style="margin-bottom:8px"><span class="pill">✨ AI 摘要</span></div><div id="ai-summary" style="font-size:14px;color:#888">AI 分析中...</div></div>`;
  const s = await callClaude(`寄件人：${m.from}\n主旨：${m.subject}\n內容：${m.snippet}\n\n請用繁體中文摘要這封信的重點（2~3句話）。`,"你是郵件摘要助手，只輸出摘要，不要多餘說明。");
  const el = document.getElementById("ai-summary");
  if (el) { el.style.color=""; el.textContent=s; }
}

// CALENDAR
function renderCalendar() {
  const week = getWeekDates(); const td = today();
  const weekRange = `${week[0].toLocaleDateString("zh-TW",{month:"long",day:"numeric"})} – ${week[6].toLocaleDateString("zh-TW",{month:"long",day:"numeric"})}`;
  const dayGrid = week.map((d,i)=>{
    const ds=dateStr(d); const isToday=ds===td; const isSel=selectedDay&&dateStr(selectedDay)===ds;
    const hasEv=events.some(e=>e.date===ds);
    return `<div onclick="selectDay(${i})" style="cursor:pointer;text-align:center;padding:6px 2px;border-radius:12px;background:${isSel?"#6c63ff":isToday?"rgba(108,99,255,.12)":"transparent"};color:${isSel?"#fff":isToday?"#6c63ff":"#000"}">
      <div style="font-size:11px;margin-bottom:2px;opacity:.7">${DAYS[i]}</div>
      <div style="font-size:16px;font-weight:${isToday||isSel?600:400}">${d.getDate()}</div>
      ${hasEv?`<div class="dot" style="background:${isSel?"#fff":"#6c63ff"}"></div>`:""}
    </div>`;
  }).join("");

  const selEvs = selectedDay ? events.filter(e=>e.date===dateStr(selectedDay)).sort((a,b)=>a.time.localeCompare(b.time)) : [];
  const selDateStr = selectedDay ? selectedDay.toLocaleDateString("zh-TW",{month:"long",day:"numeric",weekday:"short"}) : "";

  return `<div class="card" style="padding:.75rem 1rem">
    <div style="font-size:13px;color:#888;margin-bottom:10px">${weekRange}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${dayGrid}</div>
  </div>
  ${selectedDay ? `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <div style="font-weight:500">${selDateStr}</div>
    <button onclick="showAddEvent()" style="background:linear-gradient(90deg,#6c63ff,#48cae4);color:#fff;border:none;border-radius:20px;padding:5px 14px;font-size:13px;cursor:pointer">＋ 新增</button>
  </div>
  ${selEvs.length===0?`<div class="card" style="text-align:center;color:#888;font-size:14px">這天沒有行程</div>`:""}
  ${selEvs.map(ev=>`<div class="card" style="display:flex;align-items:center;gap:12px;padding:.75rem 1rem">
    <div class="event-bar" style="background:${ev.color}"></div>
    <div style="flex:1"><div style="font-weight:500;font-size:14px">${ev.title}</div><div style="font-size:12px;color:#888;margin-top:2px">⏰ ${ev.time}</div></div>
    <button onclick="deleteEvent(${ev.id})" style="background:none;border:none;cursor:pointer;font-size:16px;color:#ccc;padding:4px">✕</button>
  </div>`).join("")}
  <div id="add-form"></div>
  ` : `<div class="card" style="text-align:center;color:#888;font-size:14px">點選上方日期查看行程</div>`}`;
}

function bindCalendar() {}

function selectDay(i) { selectedDay = getWeekDates()[i]; render(); }

function deleteEvent(id) { events=events.filter(e=>e.id!==id); render(); }

function showAddEvent() {
  document.getElementById("add-form").innerHTML = `<div class="card">
    <div style="font-size:14px;font-weight:500;margin-bottom:10px">新增行程</div>
    <input type="text" id="ev-title" placeholder="行程名稱" style="margin-bottom:8px">
    <input type="time" id="ev-time" value="09:00" style="margin-bottom:10px">
    <div style="display:flex;gap:8px;margin-bottom:12px">
      ${COLORS.map(c=>`<div class="color-dot" style="background:${c}" onclick="selectColor('${c}',this)"></div>`).join("")}
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="render()" style="flex:1;padding:9px 0;border-radius:10px;border:0.5px solid #ccc;background:none;color:#888;cursor:pointer;font-size:14px">取消</button>
      <button onclick="saveEvent()" style="flex:2;padding:9px 0;border-radius:10px;border:none;background:linear-gradient(90deg,#6c63ff,#48cae4);color:#fff;font-weight:500;cursor:pointer;font-size:14px">儲存行程</button>
    </div>
  </div>`;
  selectColor(COLORS[0], document.querySelector(".color-dot"));
}

let chosenColor = COLORS[0];
function selectColor(c, el) {
  chosenColor=c;
  document.querySelectorAll(".color-dot").forEach(d=>d.classList.remove("selected"));
  el.classList.add("selected");
}

function saveEvent() {
  const title = document.getElementById("ev-title")?.value?.trim();
  const time = document.getElementById("ev-time")?.value || "09:00";
  if (!title || !selectedDay) return;
  events.push({id:Date.now(), title, date:dateStr(selectedDay), time, color:chosenColor});
  render();
}

render();
</script>
</body>
</html>
